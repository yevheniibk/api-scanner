name: API Security Scan

on:
  workflow_dispatch:

jobs:
  security-scan:
    name: Run VAmPI Security Scanner
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install requests

      # ── 3. Clone and start VAmPI ─────────────────────────────────────────────
      - name: Clone VAmPI
        run: git clone https://github.com/erev0s/VAmPI.git vampi-app

      - name: Install VAmPI dependencies
        run: pip install -r vampi-app/requirements.txt

      - name: Start VAmPI in background
        run: |
          cd vampi-app
          python app.py &
          echo "VAmPI PID: $!"

      - name: Wait for VAmPI to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5000/ > /dev/null 2>&1; then
              echo "VAmPI is up after ${i}s"
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 1
          done
          echo "ERROR: VAmPI did not start in time"
          exit 1

      # ── 4. Run scanner ───────────────────────────────────────────────────────
      - name: Run security scanner
        run: python scanner.py
